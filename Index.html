<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji Sync Log 🍼💩</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background-color: #f0f4f8; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); min-height: 95vh; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        .input-group { background: #fffdf2; padding: 20px; border-radius: 20px; border: 1px solid #ffeeba; margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #718096; font-size: 14px; }
        input[type="number"], input[type="datetime-local"] { padding: 14px; font-size: 18px; width: 92%; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        
        /* สไตล์ปุ่มเช็กอึ */
        .poop-check { display: flex; align-items: center; background: #fff; padding: 15px; border-radius: 15px; border: 2px solid #e2e8f0; margin-bottom: 20px; cursor: pointer; }
        .poop-check input { width: 25px; height: 25px; margin-right: 15px; }
        .poop-check span { font-size: 18px; font-weight: bold; color: #7a594d; }

        .quick-amounts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .amt-btn { background: white; border: 2px solid #e2e8f0; padding: 12px 5px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .save-btn { background-color: #4a90e2; color: white; border: none; padding: 20px; font-size: 20px; border-radius: 18px; width: 100%; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4); }
        .save-btn:disabled { background-color: #cbd5e0; }
        
        #logList { margin-top: 20px; text-align: left; }
        .day-container { margin-bottom: 20px; border-radius: 15px; border: 1px solid #edf2f7; overflow: hidden; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .date-header { background: #4a5568; color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .summary-badges { display: flex; gap: 5px; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 800; }
        .badge-milk { background: #ffdada; color: #9b2c2c; }
        .badge-poop { background: #e9d8fd; color: #553c9a; }
        
        .log-item { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #f7fafc; align-items: center; }
        .log-info { display: flex; align-items: center; gap: 10px; }
        .poop-icon { font-size: 20px; }
        .amount-text { font-size: 18px; font-weight: 800; color: #2b6cb0; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍼 Kenji Log</h2>
    <div class="input-group">
        <label>⏰ เวลา</label>
        <input type="datetime-local" id="feedingTime">
        
        <label>🥛 ปริมาณนม (ml)</label>
        <input type="number" id="milkAmount" placeholder="ระบุ ml" inputmode="decimal">
        
        <div class="quick-amounts">
            <div class="amt-btn" onclick="document.getElementById('milkAmount').value=30">1 oz</div>
            <div class="amt-btn" onclick="document.getElementById('milkAmount').value=60">2 oz</div>
            <div class="amt-btn" onclick="document.getElementById('milkAmount').value=90">3 oz</div>
            <div class="amt-btn" onclick="document.getElementById('milkAmount').value=120">4 oz</div>
        </div>

        <label class="poop-check">
            <input type="checkbox" id="isPoop">
            <span>💩 น้องถ่ายอุจจาระ</span>
        </label>

        <button class="save-btn" id="btnSave" onclick="saveToCloud()">💾 บันทึกข้อมูล</button>
    </div>
    <div id="logList">กำลังโหลดประวัติ...</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyCMuf17yCojhE0kPpHd6-9Kr8_Ft5O2BBRSooLRdxuob3s-bT1J4UrUqw3HBhfkDv/exec"; 

    function setCurrentTime() {
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        document.getElementById('feedingTime').value = (new Date(now - offset)).toISOString().slice(0, 16);
    }

    async function saveToCloud() {
        const time = document.getElementById('feedingTime').value;
        const amount = document.getElementById('milkAmount').value || 0;
        const isPoop = document.getElementById('isPoop').checked;

        if(!time) return alert("กรุณาระบุเวลาครับ");

        const btn = document.getElementById('btnSave');
        btn.disabled = true;
        btn.innerText = "⏳ กำลังบันทึก...";

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ 
                    id: Date.now().toString(), 
                    time: time, 
                    amount: amount,
                    poop: isPoop ? "YES" : "NO" // ส่งค่าไปว่าอึมั้ย
                })
            });
            alert("บันทึกสำเร็จ!");
            document.getElementById('milkAmount').value = "";
            document.getElementById('isPoop').checked = false; // รีเซ็ตเช็กบ็อกซ์
            setCurrentTime();
            loadData();
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "💾 บันทึกข้อมูล";
        }
    }

    async function loadData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderLogs(data);
        } catch (e) { document.getElementById('logList').innerHTML = "โหลดข้อมูลไม่สำเร็จ"; }
    }

    function renderLogs(rows) {
        const list = document.getElementById('logList');
        list.innerHTML = "";
        if(!rows || rows.length <= 1) return list.innerHTML = "ไม่มีประวัติ";
        
        const logs = rows.slice(1).sort((a,b) => new Date(b[0]) - new Date(a[0]));
        const groups = logs.reduce((acc, row) => {
            const d = new Date(row[0]).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
            if(!acc[d]) acc[d] = { items: [], totalMilk: 0, totalPoop: 0 };
            acc[d].items.push(row);
            acc[d].totalMilk += parseFloat(row[1] || 0);
            if(row[3] === "YES") acc[d].totalPoop += 1; // นับจำนวนอึ
            return acc;
        }, {});

        for (const date in groups) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day-container';
            dayDiv.innerHTML = `
                <div class="date-header">
                    <span>📅 ${date}</span>
                    <div class="summary-badges">
                        <span class="badge badge-milk">🥛 ${groups[date].totalMilk} ml</span>
                        <span class="badge badge-poop">💩 ${groups[date].totalPoop} ครั้ง</span>
                    </div>
                </div>`;
            
            groups[date].items.forEach(row => {
                const t = new Date(row[0]).toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
                const poopIcon = row[3] === "YES" ? '<span class="poop-icon">💩</span>' : '';
                dayDiv.innerHTML += `
                    <div class="log-item">
                        <div class="log-info"><span>🕒 ${t}</span> ${poopIcon}</div>
                        <b class="amount-text">${row[1]} ml</b>
                    </div>`;
            });
            list.appendChild(dayDiv);
        }
    }

    setCurrentTime();
    loadData();
</script>
</body>
</html>
